<!DOCTYPE html>
<html>
<body>

<div id="demo">
<h2>The XMLHttpRequest Object</h2>
<button type="button" onclick="loadDoc()">Change Content</button>
</div>

<script>

fetch('./db/projects.json')
  .then(function (response) {		
		return response.json();
	}).then(function (data) {		
		console.log(data);
	}).catch(function (err) {		
		console.warn('Something went wrong.', err);
	})
  .catch(e => {
    console.log(e);
    return e;
  });
</script>

</body>
